#!/usr/bin/env bash

RISK_GATE_NAME="multi-translate"
RISK_GATE_EXCLUDE_DIRS=(
  ".git"
  "node_modules"
)
RISK_GATE_SCAN_EXCLUDE_PATHS=(
  ".risk-gate.conf"
  ".githooks"
  "tools/risk-gate"
)

RISK_GATE_SECRET_PATTERNS=(
  "OpenAI key:::sk-[A-Za-z0-9_-]{20,}"
  "Gemini key:::AIza[0-9A-Za-z_-]{20,}"
  "GitHub token:::gh[pousr]_[A-Za-z0-9_]{20,}"
  "Private key block:::-----BEGIN (RSA|DSA|EC|OPENSSH|PGP)? ?PRIVATE KEY-----"
  "Bearer token literal:::Bearer[[:space:]]+[A-Za-z0-9._-]{20,}"
)

RISK_GATE_FAIL_PATTERNS=(
  "Dynamic eval:::eval[[:space:]]*\\("
  "Dynamic Function constructor:::new[[:space:]]+Function[[:space:]]*\\("
)

RISK_GATE_WARN_PATTERNS=(
  "Direct HTML injection:::[.]innerHTML[[:space:]]*="
  "React dangerous HTML:::dangerouslySetInnerHTML"
  "Document write:::document[.]write[[:space:]]*\\("
  "Shell execution:::child_process[.]exec(File)?[[:space:]]*\\("
  "Debug leftovers:::\\b(TODO|FIXME|HACK|XXX)\\b"
)

RISK_GATE_REVIEW_PATHS=(
  "js/ai-gateway.js:::LLM / external AI provider integration changed"
  "js/translator.js:::translation logic changed"
  "server.js:::public server entrypoint changed"
  ".github/workflows:::CI / automation changed"
)

RISK_GATE_REQUIRED_COMMANDS=(
  "Server syntax:::command -v node >/dev/null 2>&1 && test -f server.js:::node --check server.js"
  "Client JS syntax:::command -v node >/dev/null 2>&1 && test -d js:::for file in js/*.js; do node --check \"\$file\"; done"
)

RISK_GATE_OPTIONAL_COMMANDS=(
  "npm audit high+:::command -v npm >/dev/null 2>&1 && test -f package-lock.json && test -d node_modules && ([[ \"${RISK_GATE_MODE:-local}\" == \"ci\" ]] || [[ \"${RISK_GATE_ENABLE_NETWORK_CHECKS:-0}\" == \"1\" ]]):::npm audit --audit-level=high --omit=dev"
)
