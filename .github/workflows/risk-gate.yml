name: Risk Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  risk-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run risk gate
        run: ./tools/risk-gate/run.sh --mode ci --scope all
